name: Atualizar Dados do Tesouro Direto

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  update-tesouro-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Download and process CSV
      run: |
        node scripts/update-tesouro-data.js
        
    - name: Commit and push updated data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/tesouro-latest.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update Tesouro Direto data - $(date +%Y-%m-%d)" && git push)
